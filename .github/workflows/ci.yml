name: CI

on:
  push:
  pull_request:

jobs:
  test:
    # Base install WITHOUT numba: default dict backend + auto->dict fallback.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev extras, no numba)
        run: python -m pip install -e ".[dev]"

      - name: Sanity - import, default dict backend, numba absent
        run: >
          python -c "import importlib.util;
          from parametric_ibp_lf_reducer import api, sparse_rref;
          assert sparse_rref.DEFAULT_RREF_BACKEND == 'dict';
          assert importlib.util.find_spec('numba') is None, 'base job must not have numba'"

      - name: Run fast test suite
        # Covers default dict backend and auto->dict fallback without numba
        # (tests/test_rref_backend_auto.py). Heavy D4 acceptance
        # (RUN_D4_FULL=1, ~25-30 min) is deliberately NOT run in CI.
        run: python -m pytest

      - name: Lint
        run: ruff check .

  test-speed:
    # Speed extra WITH numba: Numba backend suites + tiny full-pipeline parity.
    # Single Python version to keep CI fast; heavy Example 4* is NOT run in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev + speed extras)
        run: python -m pip install -e ".[dev,speed]"

      - name: Numba backend, auto selection, and CLI suites
        run: python -m pytest tests/test_rref_numba_backend.py tests/test_rref_backend_auto.py tests/test_cli.py

      - name: Tiny full-pipeline parity across backends
        run: |
          python -m parametric_ibp_lf_reducer reduce examples/tiny_success_input.wl.txt --out out_dict.m --rref-backend dict
          python -m parametric_ibp_lf_reducer reduce examples/tiny_success_input.wl.txt --out out_numba.m --rref-backend numba_int_array_experimental
          python -m parametric_ibp_lf_reducer reduce examples/tiny_success_input.wl.txt --out out_auto.m --rref-backend auto
          python -c "a, b, c = (open(f).read() for f in ('out_dict.m', 'out_numba.m', 'out_auto.m')); assert a == b == c, 'backend outputs differ'; print('tiny parity OK')"
